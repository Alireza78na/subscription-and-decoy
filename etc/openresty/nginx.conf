events {
    worker_connections 2048;  # بهبود: افزایش برای اتصالات بیشتر
    multi_accept on;  # بهبود: پذیرش همزمان اتصالات
}

http {
    include /etc/openresty/mime.types;
    default_type application/octet-stream;
    
    server_tokens off; # مخفی کردن نسخه وبسرور

    # تعریف log format "main"
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # فرمت اختصاصی برای ثبت حملات فایروال (GFW) و رباتها
    log_format gfw_probe '[$time_local] 🔴 PROBE/ATTACK | IP: $remote_addr | SNI: $ssl_server_name | '
                         'TLS: $ssl_protocol / $ssl_cipher | Request: "$request" | '
                         'Status: $status | UA: "$http_user_agent"';

    # بهبود: Buffering برای کاهش تأخیر
    proxy_buffers 8 16k;
    proxy_buffer_size 8k;
    proxy_busy_buffers_size 32k;

    # بهبود: Gzip
    gzip on;
    gzip_types text/plain application/json application/yaml text/yaml;
    gzip_proxied any;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # بهبود: SSL Session Caching
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # =========================================================
    # بلاک پیشفرض برای مسدودسازی اسکنرها و دسترسی مستقیم با IP
    # =========================================================
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;
        ssl_reject_handshake on; # قطع فوری ارتباط در مرحله هندشیک
    }

    # =========================================================
    # سرور بلاک اول (Panel)
    # =========================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;

        server_name p2.fp-network.link;

        ssl_certificate /root/cert/CF.fp-network.link/fullchain.pem;
        ssl_certificate_key /root/cert/CF.fp-network.link/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers off;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;

        # هدایت تمام خطاهای 404 (خود انجینکس و پراکسیها) به صفحه سفارشی
        error_page 400 401 403 404 405 500 501 502 503 504 =404 /404.html;
        
        location = /404.html {
            root /var/www/html;
            internal;
            
            # ثبت ترافیکی که به 404 ختم شده (رباتها و Replay Attacks)
            access_log /usr/local/openresty/nginx/logs/blocked_attacks.log gfw_probe;
        }

        location /dW6tmTiBTiHlbfG {
            proxy_intercept_errors on; # رهگیری خطاهای پراکسی
            
            proxy_pass https://127.0.0.1:2087;

            proxy_ssl_verify off;
            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # پوشش استاتیک HTML برای مسیرهای ناشناس روی p1
        location / {
            root /var/www/html;
            index index.html index.htm;
            
            # ثبت ترافیکی که به صفحه دکوی برخورد کرده (اسکنهای مستقیم روی دامنه)
            access_log /usr/local/openresty/nginx/logs/blocked_attacks.log gfw_probe;
            
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # =========================================================
    # سرور بلاک دوم (Subscription & API)
    # =========================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;

        server_name s2.fp-network.link;

        ssl_certificate /root/cert/lets.fp-network.link/fullchain.pem;
        ssl_certificate_key /root/cert/lets.fp-network.link/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers off;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;

        # هدایت تمام خطاهای 404 (خود انجینکس و پراکسیها) به صفحه سفارشی
        error_page 400 401 403 404 405 500 501 502 503 504 =404 /404.html;
        
        location = /404.html {
            root /var/www/html;
            internal;
            
            # ثبت ترافیکی که به 404 ختم شده (رباتها و Replay Attacks)
            access_log /usr/local/openresty/nginx/logs/blocked_attacks.log gfw_probe;
        }

        # =========================================================
        # ✅ فیکس: لوکیشن جداگانه برای فایلهای استاتیک (JS/CSS/فونت)
        # این بلاک باید قبل از /about باشد تا اول مَچ بشه
        # بدون body_filter_by_lua → فایلهای JS و CSS دست نخورده به مرورگر میرسن
        # =========================================================
        location /about/assets {
            proxy_pass https://127.0.0.1:2053;

            proxy_ssl_verify off;
            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;

            # بافرینگ بزرگتر برای فایلهای حجیم JS (بعضی باندلها بالای 1MB هستند)
            proxy_buffers 16 64k;
            proxy_buffer_size 16k;
            proxy_busy_buffers_size 128k;

            # جلوگیری از دریافت پاسخ فشرده از upstream (3x-ui)
            proxy_set_header Accept-Encoding "";
        }

        location /about {
            proxy_intercept_errors on; # رهگیری خطاهای پراکسی

            proxy_pass https://127.0.0.1:2053;

            proxy_ssl_verify off;
            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # جلوگیری از دریافت پاسخ فشرده از upstream (برای عملکرد صحیح Lua filter)
            proxy_set_header Accept-Encoding "";

            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Expires "0" always;
            add_header Pragma "no-cache" always;

            header_filter_by_lua_block {
                ngx.header.content_length = nil;
            }
            body_filter_by_lua_file /etc/openresty/lua/subscription_modifier.lua;
        }

        location /api {
            proxy_intercept_errors on; # رهگیری خطاهای پراکسی
            
            proxy_pass https://127.0.0.1:2053;

            proxy_ssl_verify off;
            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # جلوگیری از دریافت پاسخ فشرده از upstream (برای عملکرد صحیح Lua filter)
            proxy_set_header Accept-Encoding "";

            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Expires "0" always;
            add_header Pragma "no-cache" always;

            header_filter_by_lua_block {
                ngx.header.content_length = nil;
            }
            body_filter_by_lua_file /etc/openresty/lua/subscription_modifier.lua;
        }

        # پوشش استاتیک HTML برای مسیرهای ناشناس روی s1
        location / {
            root /var/www/html;
            index index.html index.htm;
            
            # ثبت ترافیکی که به صفحه دکوی برخورد کرده (اسکنهای مستقیم روی دامنه)
            access_log /usr/local/openresty/nginx/logs/blocked_attacks.log gfw_probe;
            
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }
    }
}
