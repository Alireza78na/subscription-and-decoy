events {
    worker_connections 2048;  # بهبود: افزایش برای اتصالات بیشتر
    multi_accept on;  # بهبود: پذیرش همزمان اتصالات
}

http {
    include /etc/openresty/mime.types;
    default_type application/octet-stream;
    
    server_tokens off; # مخفی کردن نسخه وب‌سرور برای جلوگیری از شناسایی توسط اسکنرها

    # تعریف log format "main" برای حل خطا
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # بهبود: Rate Limiting برای امنیت
    #limit_req_zone $binary_remote_addr zone=subscription_limit:10m rate=5r/s;

    # بهبود: Buffering برای کاهش تأخیر
    proxy_buffers 8 16k;
    proxy_buffer_size 8k;
    proxy_busy_buffers_size 32k;

    # بهبود: Gzip برای فشرده‌سازی و سرعت
    gzip on;
    gzip_types text/plain application/json application/yaml text/yaml;
    gzip_proxied any;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # بهبود: SSL Session Caching برای اتصالات سریع‌تر
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # =========================================================
    # بلاک پیش‌فرض برای مسدودسازی اسکنرها و دسترسی مستقیم با IP
    # =========================================================
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;
        ssl_reject_handshake on; # قطع فوری ارتباط در مرحله هندشیک
    }

    # =========================================================
    # سرور بلاک اول (Panel)
    # =========================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;

        server_name p1.fp-network.link;

        ssl_certificate /root/cert/CF.fp-network.link/fullchain.pem;
        ssl_certificate_key /root/cert/CF.fp-network.link/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers off;

        # بهبود: هدرهای امنیتی
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;

        location /5QEzQCkHVN8bVO2 {
            proxy_pass https://127.0.0.1:2087;

            proxy_ssl_verify off;
            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # پوشش استاتیک HTML برای مسیرهای ناشناس روی p1
        location / {
            root /var/www/html;
            index index.html index.htm;
            
            access_log off;
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # =========================================================
    # سرور بلاک دوم (Subscription & API)
    # =========================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;

        server_name s1.fp-network.link;

        ssl_certificate /root/cert/lets.fp-network.link/fullchain.pem;
        ssl_certificate_key /root/cert/lets.fp-network.link/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers off;

        # بهبود: هدرهای امنیتی
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;

        location /about {
            # بهبود: Rate Limiting
           # limit_req zone=subscription_limit burst=10 nodelay;

            proxy_pass https://127.0.0.1:2053;

            proxy_ssl_verify off;
            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # هدرهای کنترل کش برای کلاینت (اصلاح‌شده برای بروزرسانی فوری)
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Expires "0" always;
            add_header Pragma "no-cache" always;

            header_filter_by_lua_block {
                ngx.header.content_length = nil;
            }
            body_filter_by_lua_file /etc/openresty/lua/subscription_modifier.lua;
        }

        location /api {
            # بهبود: Rate Limiting
           # limit_req zone=subscription_limit burst=10 nodelay;

            proxy_pass https://127.0.0.1:2053;

            proxy_ssl_verify off;
            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # هدرهای کنترل کش برای کلاینت (اصلاح‌شده برای بروزرسانی فوری)
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Expires "0" always;
            add_header Pragma "no-cache" always;

            header_filter_by_lua_block {
                ngx.header.content_length = nil;
            }
            body_filter_by_lua_file /etc/openresty/lua/subscription_modifier.lua;
        }

        # پوشش استاتیک HTML برای مسیرهای ناشناس روی s1
        location / {
            root /var/www/html;
            index index.html index.htm;
            
            access_log off;
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }
    }
}
